services:
  db:
    image: ankane/pgvector:latest # Postgres image voi extension pgvector chinh chu
    container_name: customs_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MyP@ss:word123}
      POSTGRES_DB: ${POSTGRES_DB:-customs_rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-customs_rag}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: customs_web_app
    volumes:
      - .:/workspace
    ports:
      - "8000:8000" # FastAPI Web & UI Port
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-MyP@ss:word123}
      - POSTGRES_DB=${POSTGRES_DB:-customs_rag}
      - POSTGRES_PORT=5432
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
